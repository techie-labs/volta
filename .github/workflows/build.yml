name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Code Quality Checks (Fastest)
  # Runs on Linux. Checks formatting, static analysis, and API compatibility.
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Run Quality Checks
      run: ./gradlew spotlessCheck detekt apiCheck --stacktrace

  # Job 2: Android, Desktop & Web Build (Medium)
  # Runs on Linux. Builds and tests non-Apple targets.
  build-linux-targets:
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build & Test (Android, JVM, Wasm)
      # Exclude iOS tasks to save time and memory on Linux runner
      # Added :library:testDebugUnitTest to ensure Android unit tests (including commonTest) are run
      run: |
        ./gradlew \
          :library:assembleDebug \
          :library:testDebugUnitTest \
          :library:jvmTest \
          :library:wasmJsTest \
          :sample:androidApp:assembleDebug \
          :sample:desktopApp:assemble \
          --stacktrace -Pkotlin.daemon.jvmargs="-Xmx4g"

  # Job 3: iOS and macOS Build (Slowest)
  # Runs on macOS. Builds iOS frameworks and tests macOS JVM implementation.
  build-macos-ios-targets:
    needs: quality-check
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build iOS Frameworks & Run macOS Tests
      # Using Debug variant is faster and uses less memory than Release
      run: |
        ./gradlew \
          :library:jvmTest \
          :library:iosSimulatorArm64Test \
          :library:linkDebugFrameworkIosSimulatorArm64 \
          :sample:shared:linkDebugFrameworkIosSimulatorArm64 \
          --stacktrace -Pkotlin.daemon.jvmargs="-Xmx6g"

  # Job 4: Windows Build
  # Runs on Windows. Tests Windows JVM implementation (WMIC/Powercfg).
  build-windows-targets:
    needs: quality-check
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build & Test (Windows JVM)
      run: |
        ./gradlew :library:jvmTest --stacktrace
