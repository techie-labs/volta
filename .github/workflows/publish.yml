name: Publish to Maven Central

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode GPG Key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > /tmp/signing_key.gpg
          echo "SIGNING_KEY_DECODED<<GPGEOF" >> $GITHUB_ENV
          cat /tmp/signing_key.gpg >> $GITHUB_ENV
          echo "GPGEOF" >> $GITHUB_ENV
          rm /tmp/signing_key.gpg

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache -PVERSION_NAME=${GITHUB_REF_NAME#v}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ env.SIGNING_KEY_DECODED }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Update README version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s|io.github.techie-labs:volta:[^\"]*|io.github.techie-labs:volta:$VERSION|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update README version to $VERSION"
          git push origin HEAD:main
