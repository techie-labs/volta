<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
    <!-- Gradients -->
    <linearGradient id="bg_grad" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
        <stop stop-color="#0F172A"/>
        <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="bolt_grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FACC15"/>
        <stop offset="1" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="compose_grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
        <stop stop-color="#4285F4"/>
        <stop offset="1" stop-color="#34A853"/>
    </linearGradient>

    <!-- Glow Filter for the Bolt -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
</defs>

<!-- 1. Background Base -->
<rect width="1280" height="640" fill="url(#bg_grad)"/>

<!-- 2. Background Pattern: Compose Hexagons (Subtle) -->
<pattern id="hex_pattern" width="100" height="174" patternUnits="userSpaceOnUse">
    <path d="M50 0 L93.3 25 V75 L50 100 L6.7 75 V25 Z" fill="none" stroke="#334155" stroke-width="2" stroke-opacity="0.15"/>
    <path d="M50 87 L93.3 112 V162 L50 187 L6.7 162 V112 Z" fill="none" stroke="#334155" stroke-width="2" stroke-opacity="0.15" transform="translate(50, 0)"/>
</pattern>
<rect width="1280" height="640" fill="url(#hex_pattern)"/>

<!-- 3. Abstract Circuit Lines (Connecting everything) -->
<path d="M0 320 H400 L450 250 H600" stroke="#4285F4" stroke-width="2" stroke-opacity="0.3" fill="none"/>
<path d="M1280 100 H900 L800 200 H600" stroke="#FACC15" stroke-width="2" stroke-opacity="0.3" fill="none"/>
<circle cx="450" cy="250" r="4" fill="#4285F4" fill-opacity="0.5"/>
<circle cx="800" cy="200" r="4" fill="#FACC15" fill-opacity="0.5"/>

<!-- 4. LEFT SIDE: Branding & Text -->
<g transform="translate(80, 160)">

    <!-- REPLACED: Vector Voltage Icon (High Quality, No PNG dependency) -->
    <!-- A dynamic, sharp thunderbolt icon inside a circle container -->
    <g transform="translate(0, 0)">
        <!-- Container Circle with subtle glow -->
        <circle cx="60" cy="70" r="60" fill="#1E293B" stroke="#334155" stroke-width="4"/>

        <!-- The Voltage Bolt -->
        <path d="M70 30 L40 75 H65 L35 110 L85 65 H60 L90 30 Z"
              fill="url(#bolt_grad)"
              stroke="#FACC15"
              stroke-width="2"
              stroke-linejoin="round"
              filter="url(#glow)"/>
    </g>

    <!-- Main Title (Shifted right) -->
    <text x="140" y="100" fill="white" font-family="sans-serif" font-weight="bold" font-size="100" letter-spacing="-2">Volta</text>

    <!-- Subtitle / Tagline -->
    <text x="10" y="190" fill="#94A3B8" font-family="sans-serif" font-weight="normal" font-size="32">The Battery Library for</text>

    <!-- Highlighted Text -->
    <text x="10" y="240" fill="url(#compose_grad)" font-family="sans-serif" font-weight="bold" font-size="48">Compose Multiplatform</text>
</g>

<!-- 5. RIGHT SIDE: Ecosystem Illustration -->
<g transform="translate(700, 100)">

    <!-- Floating UI Widget: Battery Card (Shows it's a UI lib) -->
    <g transform="translate(-100, 360)">
        <rect x="0" y="0" width="180" height="100" rx="12" fill="#1E293B" stroke="#475569" stroke-width="2"/>
        <!-- Battery Bar -->
        <rect x="20" y="20" width="140" height="16" rx="8" fill="#334155"/>
        <rect x="20" y="20" width="100" height="16" rx="8" fill="#3DDC84"/>
        <!-- Text lines -->
        <rect x="20" y="50" width="80" height="8" rx="4" fill="#94A3B8"/>
        <rect x="20" y="70" width="50" height="8" rx="4" fill="#64748B"/>
        <!-- Connection Line -->
        <path d="M180 50 L250 50" stroke="#475569" stroke-width="2" stroke-dasharray="4 4"/>
    </g>

    <!-- Floating Code Snippet (Shows it's code) -->
    <g transform="translate(450, 50)">
        <rect x="0" y="0" width="140" height="120" rx="8" fill="#1E293B" stroke="#475569" stroke-width="2" transform="rotate(10)"/>
        <g transform="rotate(10)">
            <circle cx="20" cy="20" r="4" fill="#EF4444"/>
            <circle cx="35" cy="20" r="4" fill="#F59E0B"/>
            <rect x="20" y="40" width="80" height="6" rx="3" fill="#7F52FF"/>
            <rect x="20" y="60" width="60" height="6" rx="3" fill="#FACC15"/>
            <rect x="20" y="80" width="90" height="6" rx="3" fill="#3DDC84"/>
        </g>
    </g>

    <!-- Central Devices Group -->
    <g transform="translate(100, 50)">
        <!-- Laptop -->
        <g transform="translate(40, 40)">
            <rect x="0" y="0" width="200" height="130" rx="8" fill="#334155" stroke="#64748B" stroke-width="2"/>
            <rect x="10" y="10" width="180" height="110" fill="#0F172A"/> <!-- Screen -->
            <path d="M-20 130 H220 L200 145 H0 L-20 130Z" fill="#475569"/> <!-- Base -->
            <!-- Compose Logo on Screen -->
            <path d="M80 35 L120 60 L80 85 L40 60 Z" stroke="#4285F4" stroke-width="4" fill="none"/>
        </g>

        <!-- Phone (Overlapping Laptop) -->
        <g transform="translate(200, 100)">
            <rect x="0" y="0" width="70" height="140" rx="10" fill="#1E293B" stroke="#FACC15" stroke-width="3"/>
            <rect x="5" y="15" width="60" height="110" fill="#0F172A"/>
            <!-- Battery Icon Big -->
            <rect x="20" y="50" width="30" height="40" rx="4" stroke="white" stroke-width="2"/>
            <path d="M30 60 L40 70 L30 80" stroke="#FACC15" stroke-width="2" fill="none"/>
        </g>
    </g>
</g>

</svg>
